<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vouks - Consultoria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div class="tela-inicial" id="telaInicial">
        <img src="https://i.imgur.com/SU7mKZL.png" alt="Logo Vouks" class="logo-grande">
        <h1>VOUKS</h1>
        <p class="subtitulo">Consultoria</p>
        
        <div style="margin-top: 50px;">
            <input type="email" placeholder="Seu e-mail" id="email">
            <input type="password" placeholder="Sua senha" id="senha">
            <button onclick="logar()" id="entrar">ENTRAR</button>
        </div>
    </div>

    <!-- TELA PRINCIPAL COM FORMULÁRIO -->
    <div class="tela-principal" id="telaPrincipal">
        <div class="cabecalho">
            <div class="logo-area">
                <img src="https://i.imgur.com/SU7mKZL.png" alt="Logo Vouks" class="logo-pequena">
                <span class="nome-cabecalho">VOUKS</span>
            </div>
            <button class="btn-sair"  onclick="sair()">SAIR</button>
        </div>

        

    <script src="script.js"></script>
</body>
</html>
